<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>VerdaCore - Login</title>
</head>

<body style="font-family: Arial, sans-serif; padding: 20px;">

    <h2>Login to VerdaCore</h2>

    <form method="POST">
        <label>Username:</label><br>
        <input type="text" name="username" required><br><br>

        <label>Password:</label><br>
        <input type="password" name="password" required><br><br>

        <button type="submit"
            style="padding: 10px 20px; background-color: #0056b3; color: white; border: none; border-radius: 5px;">Login</button>
    </form>

    <p>Don't have an account? <a href="/register">Register here</a></p>

</body>

</html>
