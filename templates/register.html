<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>VerdaCore - Register</title>
</head>

<body style="font-family: Arial, sans-serif; padding: 20px;">

    <h2>Create a VerdaCore Account</h2>

    <form method="POST">
        <label>Username:</label><br>
        <input type="text" name="username" required><br><br>

        <label>Password:</label><br>
        <input type="password" name="password" required><br><br>

        <label>Course/Program (e.g. BSCPE):</label><br>
        <input type="text" name="program" required><br><br>

        <label>Year Level (e.g. 1):</label><br>
        <input type="number" name="year_level" required><br><br>

        <button type="submit"
            style="padding: 10px 20px; background-color: #2d5a27; color: white; border: none; border-radius: 5px;">Register
            Now</button>
    </form>

</body>

</html>
